# Builds the Tauri Windows shell (NSIS installer) and, on tag pushes,
# attaches it to a DRAFT GitHub Release.
#
# NOTE: the installer is UNSIGNED pending a code-signing certificate
# (Azure Trusted Signing / an OV cert). Until one is configured, Windows
# SmartScreen will warn users on first run — this is expected.
name: Desktop (Windows)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Build Tauri bundle
        run: npx tauri build
        working-directory: desktop

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: seseri-nsis-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: desktop/src-tauri/target/release/bundle/nsis/*.exe

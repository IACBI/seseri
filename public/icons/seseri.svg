<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Seseri "sinyal" mark: five round-capped bars, amber dial glow on warm charcoal. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241c13"/>
      <stop offset="1" stop-color="#14100c"/>
    </linearGradient>
    <linearGradient id="bar" gradientUnits="userSpaceOnUse" x1="0" y1="106" x2="0" y2="406">
      <stop offset="0" stop-color="#ffc46b"/>
      <stop offset="0.55" stop-color="#f2a33c"/>
      <stop offset="1" stop-color="#c98a33"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.32" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#f2a33c" stop-opacity="0.14"/>
      <stop offset="0.6" stop-color="#f2a33c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#sheen)"/>
  <g stroke="url(#bar)" stroke-width="44" stroke-linecap="round">
    <line x1="100" y1="205" x2="100" y2="307"/>
    <line x1="178" y1="148" x2="178" y2="364"/>
    <line x1="256" y1="106" x2="256" y2="406"/>
    <line x1="334" y1="178" x2="334" y2="334"/>
    <line x1="412" y1="136" x2="412" y2="376"/>
  </g>
</svg>

# Quality gate — move to .github/workflows/ci.yml once the repo is pushed.
# Runs the same chain as `npm run verify`.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --prefix worker ci
      - run: npm run verify
